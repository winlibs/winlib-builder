name: Build brotli
run-name: "Build brotli-${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: brotli tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v4
        with:
          path: winlib-builder
      - name: Checkout brotli
        uses: actions/checkout@v4
        with:
          path: brotli
          repository: google/brotli
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Configure brotli
        run: md build && cd build && cmake -G "Visual Studio ${{steps.virtuals.outputs.vsinst}}" -A ${{steps.virtuals.outputs.msarch}} -T ${{steps.virtuals.outputs.msts}} -DCMAKE_SYSTEM_VERSION=${{steps.virtuals.outputs.winsdk}} ..\brotli
      - name: Build brotli
        run: cd build && cmake --build . --config RelWithDebInfo
      - name: Install brotli
        run: |
          cd build
          cmake --install . --config RelWithDebInfo --prefix ..\install
          xcopy RelWithDebInfo\brotli*.pdb ..\install\bin\*
      - name: Normalize version
        id: normalize_version
        shell: pwsh
        run: echo "version=$('${{ github.event.inputs.version }}' -replace '^v')" >> $env:GITHUB_OUTPUT
      - name: Copy license files
        run: xcopy brotli\LICENSE install\share\licenses\brotli\*
      - name: Generate SBOMs
        shell: pwsh
        run: >
          .\winlib-builder\scripts\generate-sbom.ps1
          -Library brotli
          -Version '${{ github.event.inputs.version }}'
          -InstallRoot 'install'
          -Vs '${{ steps.virtuals.outputs.vs }}'
          -Arch '${{ matrix.arch }}'
          -PhpVersion '${{ github.event.inputs.php }}'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brotli-${{steps.normalize_version.outputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
