name: Build liblzma
run-name: "Build ${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: liblzma tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout liblzma
        uses: actions/checkout@v5
        with:
          path: liblzma
          repository: winlibs/liblzma
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Configure liblzma
        run: cd liblzma && md build && cd build && cmake -G "Visual Studio ${{steps.virtuals.outputs.vsinst}}" -A ${{steps.virtuals.outputs.msarch}} -T ${{steps.virtuals.outputs.msts}} -DCMAKE_SYSTEM_VERSION=${{steps.virtuals.outputs.winsdk}} ..
      - name: Build liblzma
        run: cd liblzma\build && cmake --build . --config RelWithDebInfo
      - name: Install liblzma
        run: |
          cd liblzma\build
          cmake --install . --config RelWithDebInfo --component liblzma_Development --prefix ..\..\install
          IF EXIST RelWithDebInfo\liblzma_a.pdb xcopy RelWithDebInfo\liblzma_a.pdb ..\..\install\lib\*
      - name: Copy license files
        run: |
          xcopy liblzma\COPYING install\share\licenses\liblzma\*
          xcopy liblzma\COPYING.0BSD install\share\licenses\liblzma\*
          xcopy liblzma\COPYING.GPLv2 install\share\licenses\liblzma\*
          xcopy liblzma\COPYING.GPLv3 install\share\licenses\liblzma\*
          xcopy liblzma\COPYING.LGPLv2.1 install\share\licenses\liblzma\*
      - name: Generate SBOMs
        shell: pwsh
        run: >
          .\winlib-builder\scripts\generate-sbom.ps1
          -Library liblzma
          -Version '${{ github.event.inputs.version }}'
          -InstallRoot 'install'
          -Vs '${{ steps.virtuals.outputs.vs }}'
          -Arch '${{ matrix.arch }}'
          -PhpVersion '${{ github.event.inputs.php }}'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
