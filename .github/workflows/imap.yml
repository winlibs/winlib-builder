name: Build imap
run-name: "Build ${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: imap tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout imap
        uses: actions/checkout@v5
        with:
          path: imap
          repository: winlibs/imap
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Setup MSVC development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{matrix.arch}}
          toolset: ${{steps.virtuals.outputs.toolset}}
      - name: Build imap
        run: cd imap && nmake /f makefile.w2k
      - name: Install imap
        run: |
          cd imap
          xcopy c-client\*.h ..\install\include\c-client\*
          xcopy c-client\cclient_a.lib ..\install\lib\*
      - name: Copy license files
        run: |
          xcopy imap\LICENSE.txt install\share\licenses\c-client\*
          xcopy imap\NOTICE install\share\licenses\c-client\*
      - name: Generate SBOMs
        shell: pwsh
        run: >
          .\winlib-builder\scripts\generate-sbom.ps1
          -Library imap
          -Version '${{ github.event.inputs.version }}'
          -InstallRoot 'install'
          -Vs '${{ steps.virtuals.outputs.vs }}'
          -Arch '${{ matrix.arch }}'
          -PhpVersion '${{ github.event.inputs.php }}'
      - name: Set package name
        id: package
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}' -replace '^imap-', ''
          "name=c-client-$version" >> $env:GITHUB_OUTPUT
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{steps.package.outputs.name}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
