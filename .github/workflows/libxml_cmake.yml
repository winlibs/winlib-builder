name: Build libxml2 with CMake
run-name: "Build ${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: libxml2 tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
      stability:
        description: the series stability
        required: false
        default: 'staging'
      workflow_run_ids:
        description: Comma-separated winlib-builder workflow run IDs to download dependency artifacts from
        required: false
      workflow_run_repository:
        description: Repository containing dependency workflow runs
        required: false
        default: 'winlibs/winlib-builder'
permissions:
  actions: read
  contents: read
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout libxml2
        uses: actions/checkout@v5
        with:
          path: libxml2
          repository: winlibs/libxml2
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Fetch dependencies
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $fetchParams = @{
            lib = "libxml2"
            version = "${{github.event.inputs.php}}"
            vs = "${{steps.virtuals.outputs.vs}}"
            arch = "${{matrix.arch}}"
            stability = "${{github.event.inputs.stability}}"
          }
          $workflowRunIds = "${{github.event.inputs.workflow_run_ids}}"
          if (-not [string]::IsNullOrWhiteSpace($workflowRunIds)) {
            $fetchParams.workflow_run_ids = $workflowRunIds
            $fetchParams.repository = "${{github.event.inputs.workflow_run_repository}}"
          }
          & winlib-builder/scripts/fetch-deps.ps1 @fetchParams
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup MSVC development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{matrix.arch}}
          toolset: ${{steps.virtuals.outputs.toolset}}
      - name: Configure shared libxml2
        run: |
          cmake -S libxml2 -B libxml2\build-shared -G "Visual Studio ${{steps.virtuals.outputs.vsinst}}" -A ${{steps.virtuals.outputs.msarch}}^
            -T ${{steps.virtuals.outputs.msts}} -DCMAKE_SYSTEM_VERSION=${{steps.virtuals.outputs.winsdk}}^
            -DCMAKE_INSTALL_PREFIX=%GITHUB_WORKSPACE%\install^
            -DBUILD_SHARED_LIBS=ON^
            -DLIBXML2_WITH_PROGRAMS=ON^
            -DLIBXML2_WITH_TESTS=OFF^
            -DLIBXML2_WITH_PYTHON=OFF^
            -DLIBXML2_WITH_ICONV=ON^
            -DCMAKE_INCLUDE_PATH:PATH=%GITHUB_WORKSPACE%\deps\include^
            -DCMAKE_LIBRARY_PATH:PATH=%GITHUB_WORKSPACE%\deps\lib^
            -DLIBXML2_WITH_HTTP=OFF^
            -DLIBXML2_WITH_LEGACY=OFF^
            -DLIBXML2_WITH_SCHEMATRON=OFF^
            -DLIBXML2_WITH_ZLIB=OFF
      - name: Build shared libxml2
        run: cmake --build libxml2\build-shared --config RelWithDebInfo
      - name: Install shared libxml2
        run: cmake --install libxml2\build-shared --config RelWithDebInfo
      - name: Configure static libxml2
        run: |
          cmake -S libxml2 -B libxml2\build-static -G "Visual Studio ${{steps.virtuals.outputs.vsinst}}" -A ${{steps.virtuals.outputs.msarch}}^
            -T ${{steps.virtuals.outputs.msts}} -DCMAKE_SYSTEM_VERSION=${{steps.virtuals.outputs.winsdk}}^
            -DBUILD_SHARED_LIBS=OFF^
            -DLIBXML2_WITH_PROGRAMS=OFF^
            -DLIBXML2_WITH_TESTS=OFF^
            -DLIBXML2_WITH_PYTHON=OFF^
            -DLIBXML2_WITH_ICONV=ON^
            -DCMAKE_INCLUDE_PATH:PATH=%GITHUB_WORKSPACE%\deps\include^
            -DCMAKE_LIBRARY_PATH:PATH=%GITHUB_WORKSPACE%\deps\lib^
            -DLIBXML2_WITH_HTTP=OFF^
            -DLIBXML2_WITH_LEGACY=OFF^
            -DLIBXML2_WITH_SCHEMATRON=OFF^
            -DLIBXML2_WITH_ZLIB=OFF
      - name: Build static libxml2
        run: cmake --build libxml2\build-static --config RelWithDebInfo --target LibXml2
      - name: Configure static-for-DLL libxml2
        run: |
          cmake -S libxml2 -B libxml2\build-static-for-dll -G "Visual Studio ${{steps.virtuals.outputs.vsinst}}" -A ${{steps.virtuals.outputs.msarch}}^
            -T ${{steps.virtuals.outputs.msts}} -DCMAKE_SYSTEM_VERSION=${{steps.virtuals.outputs.winsdk}}^
            -DCMAKE_C_FLAGS="/D LIBXML_STATIC_FOR_DLL"^
            -DBUILD_SHARED_LIBS=OFF^
            -DLIBXML2_WITH_PROGRAMS=OFF^
            -DLIBXML2_WITH_TESTS=OFF^
            -DLIBXML2_WITH_PYTHON=OFF^
            -DLIBXML2_WITH_ICONV=ON^
            -DCMAKE_INCLUDE_PATH:PATH=%GITHUB_WORKSPACE%\deps\include^
            -DCMAKE_LIBRARY_PATH:PATH=%GITHUB_WORKSPACE%\deps\lib^
            -DLIBXML2_WITH_HTTP=OFF^
            -DLIBXML2_WITH_LEGACY=OFF^
            -DLIBXML2_WITH_SCHEMATRON=OFF^
            -DLIBXML2_WITH_ZLIB=OFF
      - name: Build static-for-DLL libxml2
        run: cmake --build libxml2\build-static-for-dll --config RelWithDebInfo --target LibXml2
      - name: Package PHP-compatible layout
        run: |
          copy libxml2\build-static\RelWithDebInfo\libxml2s.lib install\lib\libxml2_a.lib
          copy libxml2\build-static-for-dll\RelWithDebInfo\libxml2s.lib install\lib\libxml2_a_dll.lib
          if exist install\bin\xml2-config del /q install\bin\xml2-config
          if exist install\lib\pkgconfig rmdir /s /q install\lib\pkgconfig
          if exist install\lib\cmake rmdir /s /q install\lib\cmake
          if exist install\share rmdir /s /q install\share
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
