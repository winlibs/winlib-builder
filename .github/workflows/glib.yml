name: Build glib
run-name: "Build ${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: glib tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
      stability:
        description: the series stability
        required: false
        default: 'staging'
      workflow_run_ids:
        description: Comma-separated winlib-builder workflow run IDs to download dependency artifacts from
        required: false
permissions:
  actions: read
  contents: read
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout glib
        uses: actions/checkout@v5
        with:
          path: glib
          repository: winlibs/glib
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Fetch dependencies
        run: powershell winlib-builder/scripts/fetch-deps -lib glib -version ${{github.event.inputs.php}} -vs ${{steps.virtuals.outputs.vs}} -arch ${{matrix.arch}} -stability ${{github.event.inputs.stability}} -workflow_run_ids:'${{github.event.inputs.workflow_run_ids}}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup msbuild
        uses: microsoft/setup-msbuild@v2
      - name: Build glib
        run: cd glib && msbuild /p:Configuration=Release_BundledPCRE;Platform=${{steps.virtuals.outputs.msarch}};PlatformToolset=${{steps.virtuals.outputs.msts}};WindowsTargetPlatformVersion=${{steps.virtuals.outputs.winsdk}};PythonPath=C:\hostedtoolcache\windows\Python\3.7.9\x64 win32\vs${{steps.virtuals.outputs.vsnum}}\glib.sln
      - name: Install glib
        run: xcopy /e vs${{steps.virtuals.outputs.vsnum}}\${{steps.virtuals.outputs.msarch}} install\*
      - name: Copy license files
        run: xcopy glib\COPYING install\share\licenses\glib\*
      - name: Generate SBOMs
        shell: pwsh
        run: >
          .\winlib-builder\scripts\generate-sbom.ps1
          -Library glib
          -Version '${{ github.event.inputs.version }}'
          -InstallRoot 'install'
          -Vs '${{ steps.virtuals.outputs.vs }}'
          -Arch '${{ matrix.arch }}'
          -PhpVersion '${{ github.event.inputs.php }}'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
