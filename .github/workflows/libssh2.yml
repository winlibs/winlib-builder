name: Build libssh2
run-name: "Build ${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: libssh2 tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
      stability:
        description: the series stability
        required: false
        default: 'staging'
      workflow_run_ids:
        description: Comma-separated winlib-builder workflow run IDs to download dependency artifacts from
        required: false
permissions:
  actions: read
  contents: read
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout libssh2
        uses: actions/checkout@v5
        with:
          path: libssh2
          repository: winlibs/libssh2
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Fetch dependencies
        run: powershell winlib-builder/scripts/fetch-deps -lib libssh2 -version ${{github.event.inputs.php}} -vs ${{steps.virtuals.outputs.vs}} -arch ${{matrix.arch}} -stability ${{github.event.inputs.stability}} -workflow_run_ids:'${{github.event.inputs.workflow_run_ids}}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure libssh2
        run: cd libssh2 && cmake -G "Visual Studio ${{steps.virtuals.outputs.vsinst}}" -A ${{steps.virtuals.outputs.msarch}} -T ${{steps.virtuals.outputs.msts}} -DCMAKE_SYSTEM_VERSION=${{steps.virtuals.outputs.winsdk}} -DCRYPTO_BACKEND=OpenSSL -DOPENSSL_ROOT_DIR:PATH=${{github.workspace}}/deps -DCMAKE_INCLUDE_PATH:PATH=${{github.workspace}}/deps/include -DCMAKE_LIBRARY_PATH:PATH=${{github.workspace}}/deps/lib -DCMAKE_PROJECT_INCLUDE:FILEPATH=${{github.workspace}}/winlib-builder/cmake/php-sdk-library-suffixes.cmake -DENABLE_ZLIB_COMPRESSION=ON -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=OFF .
      - name: Build libssh2
        run: cd libssh2 && cmake --build . --config RelWithDebInfo
      - name: Install libssh2
        run: |
          cd libssh2
          cmake --install . --config RelWithDebInfo --prefix ..\build
          copy src\RelWithDebInfo\libssh2.pdb ..\build\bin
          move ..\build\include ..\build\include1
          mkdir ..\build\include
          move ..\build\include1 ..\build\include\libssh2
          del /s /q ..\build\lib\pkgconfig\*
          del /s /q ..\build\share\*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: build
