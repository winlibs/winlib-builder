name: Build gettext
on:
  workflow_dispatch:
    inputs:
      version:
        description: gettext tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
      repository:
        description: gettext repository to build
        required: false
        default: winlibs/gettext
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
          arch: [x64, x86]
    runs-on: windows-2022
    steps:
      - name: Disable Git CRLF conversion
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout gettext
        uses: actions/checkout@v5
        with:
          path: gettext
          repository: ${{github.event.inputs.repository}}
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{matrix.arch}}
          sdk: ${{steps.virtuals.outputs.winsdk}}
          toolset: ${{steps.virtuals.outputs.toolset}}
      - name: Setup Cygwin
        run: |
          curl -fsSL https://cygwin.com/setup-x86_64.exe -o setup-x86_64.exe
          setup-x86_64.exe -q -n -N -R C:\cygwin64 -l C:\cygwin-packages -s https://mirrors.kernel.org/sourceware/cygwin/ -P make,binutils,mingw64-i686-binutils,mingw64-i686-gcc-core,mingw64-x86_64-binutils,mingw64-x86_64-gcc-core
      - name: Build gettext
        shell: pwsh
        env:
          HOST_TRIPLET: ${{matrix.arch == 'x64' && 'x86_64-w64-mingw32' || 'i686-w64-mingw32'}}
        run: |
          $script = @'
          win_to_cygpath() {
            local raw="$1"
            local path
            path="$(cygpath -u "$raw")"
            case "$path" in
              /[A-Za-z]/*)
                local drive
                drive="$(printf '%s' "${path:1:1}" | tr '[:upper:]' '[:lower:]')"
                path="/cygdrive/$drive${path:2}"
                ;;
            esac
            printf '%s\n' "$path"
          }
          workspace="$(win_to_cygpath "$GITHUB_WORKSPACE")"
          runtime="$workspace/gettext/source/gettext-runtime"
          src="$runtime/intl"
          prefix="$workspace/install"
          cl_path="$(win_to_cygpath "$(cmd /c where cl.exe | tr -d '\r' | head -n 1)")"
          tool_dir="$(dirname "$cl_path")"
          export PATH="$tool_dir:/usr/bin:$PATH"
          mkdir -p "$prefix"
          cd "$runtime"
          ./configure \
            --host="$HOST_TRIPLET" \
            --prefix="$prefix" \
            --enable-shared \
            --enable-static \
            CC="$runtime/../build-aux/compile cl -nologo" \
            CFLAGS="-MD -O2 -Zi -FS" \
            CXX="$runtime/../build-aux/compile cl -nologo" \
            CXXFLAGS="-MD -O2 -Zi -FS" \
            CPPFLAGS="-D_WIN32_WINNT=0x0601" \
            LDFLAGS="-Wl,-DEBUG" \
            LD="link.exe" \
            NM="dumpbin.exe -symbols" \
            STRIP=":" \
            AR="$workspace/winlib-builder/autotools/ar-lib lib.exe" \
            RANLIB=":"
          touch aclocal.m4 configure config.h.in Makefile.in
          touch intl/aclocal.m4 intl/configure intl/config.h.in intl/Makefile.in intl/gnulib-lib/Makefile.in
          perl -0pi -e 's/ -version-info \$\(LTV_CURRENT\):\$\(LTV_REVISION\):\$\(LTV_AGE\) \\\n/ -avoid-version \\\n/' intl/Makefile
          make -C intl -j2
          make -C intl install
          '@
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE 'build-gettext.sh'
          [System.IO.File]::WriteAllText($scriptPath, $script.Replace("`r`n", "`n"), [System.Text.Encoding]::ASCII)
          $cygwinScriptPath = & C:\cygwin64\bin\cygpath.exe -u $scriptPath
          & C:\cygwin64\bin\bash.exe --noprofile --norc -eo pipefail $cygwinScriptPath
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
      - name: Normalize gettext install
        shell: pwsh
        env:
          LIB_MACHINE: ${{matrix.arch == 'x64' && 'X64' || 'X86'}}
        run: |
          New-Item -ItemType Directory -Force -Path install/bin, install/include, install/lib | Out-Null
          $searchRoots = @('install', 'gettext/source/gettext-runtime/intl')
          function Copy-First {
            param([string[]] $Patterns, [string] $Destination)
            foreach ($root in $searchRoots) {
              foreach ($pattern in $Patterns) {
                $match = Get-ChildItem -Path $root -Recurse -File -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($match) {
                  Copy-Item $match.FullName $Destination -Force
                  return $true
                }
              }
            }
            return $false
          }
          Copy-First @('libintl.dll', 'intl.dll', 'intl-*.dll') 'install/bin/libintl.dll' | Out-Null
          Copy-First @('libintl.pdb', 'intl.pdb', 'intl-*.pdb') 'install/bin/libintl.pdb' | Out-Null
          if (!(Test-Path 'install/include/libintl.h')) {
            Copy-Item 'gettext/source/gettext-runtime/intl/libintl.h' 'install/include/libintl.h' -Force
          }
          Copy-First @('libintl.dll.lib', 'intl.dll.lib', 'intl-*.dll.lib', 'libintl.lib') 'install/lib/libintl.lib' | Out-Null
          if (!(Test-Path 'install/lib/libintl_a.lib')) {
            Copy-First @('libintl_a.lib', 'intl.lib') 'install/lib/libintl_a.lib' | Out-Null
          }
          Copy-First @('libintl_a.pdb', 'intl_a.pdb', 'vc*.pdb') 'install/lib/libintl_a.pdb' | Out-Null
          $exports = Get-ChildItem -Path 'gettext/source/gettext-runtime/intl' -Recurse -Force -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like 'intl*.dll.def' -or $_.Name -like 'libintl*.dll.def' -or $_.Name -eq 'intl.expsym' } |
            Sort-Object @{ Expression = { if ($_.Name -like '*.def') { 0 } else { 1 } } } |
            Select-Object -First 1
          if (!$exports) {
            throw 'Unable to find libintl export symbols'
          }
          $defOut = 'install/lib/libintl.def'
          $defText = Get-Content $exports.FullName | Where-Object { $_ -and $_ -notmatch '^\s*(LIBRARY|NAME|EXPORTS)\b' -and $_ -notmatch '^\s*;' }
          $defText = @('LIBRARY libintl.dll', 'EXPORTS') + ($defText | ForEach-Object { "  $_" })
          Set-Content -Path $defOut -Value $defText -Encoding ASCII
          Write-Host "Regenerating import library from $($exports.FullName)"
          & lib.exe /nologo /machine:$env:LIB_MACHINE /def:$defOut /name:libintl.dll /out:install/lib/libintl.lib
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          Remove-Item -Force -ErrorAction SilentlyContinue 'install/bin/intl*.dll', 'install/lib/intl*.lib', 'install/lib/libintl.def', 'install/lib/libintl.exp', 'install/lib/libintl.la'
          Get-ChildItem -Recurse install | Format-Table FullName, Length -AutoSize
      - name: QA gettext artifacts
        run: |
          if not exist install\bin\libintl.dll exit /b 1
          if not exist install\include\libintl.h exit /b 1
          if not exist install\lib\libintl.lib exit /b 1
          dumpbin /exports install\bin\libintl.dll
          dumpbin /dependents install\bin\libintl.dll
          echo extern char *gettext(const char *); int main(void) { return gettext("ok") == 0; } > %TEMP%\gettext-qa.c
          cl /nologo /I install\include %TEMP%\gettext-qa.c install\lib\libintl.lib /Fe:%TEMP%\gettext-qa.exe
          dumpbin /dependents %TEMP%\gettext-qa.exe
          dumpbin /dependents %TEMP%\gettext-qa.exe | findstr /i "libintl.dll"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
