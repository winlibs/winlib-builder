name: Build openldap
on:
  workflow_dispatch:
    inputs:
      version:
        description: openldap tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
      stability:
        description: the series stability
        required: false
        default: 'staging'
      workflow_run_ids:
        description: Comma-separated winlib-builder workflow run IDs to download dependency artifacts from
        required: false
permissions:
  actions: read
  contents: read
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout openldap
        uses: actions/checkout@v5
        with:
          path: openldap
          repository: winlibs/openldap
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Fetch dependencies
        run: powershell winlib-builder/scripts/fetch-deps -lib openldap -version ${{github.event.inputs.php}} -vs ${{steps.virtuals.outputs.vs}} -arch ${{matrix.arch}} -stability ${{github.event.inputs.stability}} -workflow_run_ids:'${{github.event.inputs.workflow_run_ids}}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout rxspencer
        uses: actions/checkout@v5
        with:
          path: rxspencer
          repository: garyhouston/rxspencer
          ref: v3.9.0
      - name: Setup MSVC development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{matrix.arch}}
          toolset: ${{steps.virtuals.outputs.toolset}}
      - name: Build and install rxspencer
        run: |
          cd rxspencer
          cmake -G "Visual Studio ${{steps.virtuals.outputs.vsinst}}" -A ${{steps.virtuals.outputs.msarch}} -T ${{steps.virtuals.outputs.msts}} -DCMAKE_SYSTEM_VERSION=${{steps.virtuals.outputs.winsdk}} -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -Drxshared=0 -DBUILD_TESTING=OFF -DINSTALL_DOCS=OFF .
          cmake --build . --config Release
          cmake --install . --config Release --prefix ..\deps
          move ..\deps\include\rxspencer\regex.h ..\deps\include\regex.h
          rmdir ..\deps\include\rxspencer
          ren ..\deps\lib\rxspencer.lib libregex.lib
          tree /a /f ..\deps
      - name: Create build script
        run: |
          cd openldap
          set WORKSPACE=${{github.workspace}}
          set WORKSPACE=%WORKSPACE:\=/%
          set WORKSPACE=/%WORKSPACE::=%
          if "${{matrix.arch}}" == "x86" (
            set HOST_TRIPLET=i686-w64-mingw32
          ) else (
            set HOST_TRIPLET=x86_64-w64-mingw32
          )
          > winlibs.sh echo export PATH=/usr/local/bin:/usr/bin:/bin:/opt/bin:$PATH
          >>winlibs.sh echo pacman -S --noconfirm make groff
          >>winlibs.sh echo ./configure --host=%HOST_TRIPLET% --disable-slapd --disable-shared --prefix='${pcfiledir}/../..' --includedir='${prefix}/include/openldap' --sysconfdir=/c/openldap/sysconf --with-subdir=no \
          >>winlibs.sh echo   CC='%WORKSPACE%/winlib-builder/autotools/compile cl -nologo' \
          >>winlibs.sh echo   AR='%WORKSPACE%/winlib-builder/autotools/ar-lib lib' \
          >>winlibs.sh echo   NM='dumpbin -symbols' \
          >>winlibs.sh echo   STRIP=':' \
          >>winlibs.sh echo   RANLIB=':' \
          >>winlibs.sh echo   WINDRES='%WORKSPACE%/winlib-builder/autotools/windres' \
          >>winlibs.sh echo   RC='%WORKSPACE%/winlib-builder/autotools/windres' \
          >>winlibs.sh echo   CFLAGS='-MD -O2 -Ob1 -Gy -Zc:inline -GF -I%WORKSPACE%/deps/include' \
          >>winlibs.sh echo   LDFLAGS='-L%WORKSPACE%/deps/lib' \
          >>winlibs.sh echo   LIBS='libregex.lib -lWs2_32'
          >>winlibs.sh echo make depend
          >>winlibs.sh echo make
          >>winlibs.sh echo make install prefix=%WORKSPACE%/install exec_prefix=%WORKSPACE%/install includedir=%WORKSPACE%/install/include/openldap libdir=%WORKSPACE%/install/lib
      - name: Build openldap
        run: |
          cd openldap
          set CHERE_INVOKING=yes
          set MSYS2_PATH_TYPE=inherit
          set MSYS2_ARG_CONV_EXCL=*
          set INCLUDE=${{github.workspace}}\deps\include;%INCLUDE%
          set LIB=${{github.workspace}}\deps\lib;%LIB%
          C:\msys64\usr\bin\bash.exe -lc ./winlibs.sh
      - name: Patch installation
        run: |
          xcopy openldap\libraries\liblber\olber32_a.pdb install\lib\*
          xcopy openldap\libraries\libldap\oldap32_a.pdb install\lib\*
      - name: Verify ldap.conf path
        run: |
          powershell -NoProfile -Command "$ErrorActionPreference = 'Stop'; $header = Get-Content -Raw 'openldap\include\ldap_config.h'; if ($header.IndexOf('c:\\openldap\\sysconf', [StringComparison]::OrdinalIgnoreCase) -lt 0) { throw 'openldap\include\ldap_config.h does not contain c:\\openldap\\sysconf' }; $lib = [Text.Encoding]::ASCII.GetString([IO.File]::ReadAllBytes('install\lib\oldap32_a.lib')); if ($lib.IndexOf('c:\openldap\sysconf\ldap.conf', [StringComparison]::OrdinalIgnoreCase) -lt 0) { throw 'oldap32_a.lib does not contain c:\openldap\sysconf\ldap.conf' }"
      - name: Verify pkg-config files
        run: |
          powershell -NoProfile -Command "$ErrorActionPreference = 'Stop'; Get-ChildItem 'install\lib\pkgconfig\*.pc' | ForEach-Object { $text = Get-Content -Raw $_.FullName; if ($text.IndexOf('/winlib-builder/', [StringComparison]::OrdinalIgnoreCase) -ge 0) { throw ($_.Name + ' contains the runner workspace path') }; if ($text.IndexOf('prefix=${pcfiledir}/../..', [StringComparison]::Ordinal) -lt 0) { throw ($_.Name + ' does not use a relocatable prefix') } }"
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}-logs
          if-no-files-found: ignore
          path: |
            openldap/config.log
            openldap/winlibs.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
