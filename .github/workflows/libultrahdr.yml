name: Build libultrahdr
run-name: "Build ${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: libultrahdr tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
        arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout libultrahdr
        uses: actions/checkout@v5
        with:
          path: libultrahdr
          repository: winlibs/libultrahdr
          ref: ${{ github.event.inputs.version }}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{ github.event.inputs.php }} -arch ${{ matrix.arch }}
      - name: Configure libultrahdr
        run: >-
          cmake -S libultrahdr -B libultrahdr\build
          -G "Visual Studio ${{ steps.virtuals.outputs.vsinst }}"
          -A ${{ steps.virtuals.outputs.msarch }}
          -T ${{ steps.virtuals.outputs.msts }}
          -DCMAKE_SYSTEM_VERSION=${{ steps.virtuals.outputs.winsdk }}
          -DBUILD_SHARED_LIBS=ON
          -DUHDR_BUILD_EXAMPLES=OFF
          -DUHDR_BUILD_TESTS=OFF
          -DUHDR_BUILD_BENCHMARK=OFF
          -DUHDR_BUILD_FUZZERS=OFF
          -DUHDR_BUILD_DEPS=ON
          -DUHDR_BUILD_JAVA=OFF
          -DUHDR_BUILD_PACKAGING=OFF
          -DUHDR_ENABLE_INSTALL=OFF
          -DUHDR_ENABLE_GLES=OFF
          -DUHDR_ENABLE_WERROR=OFF
          -DUHDR_WRITE_XMP=OFF
          -DUHDR_WRITE_ISO=ON
      - name: Build libultrahdr
        run: cmake --build libultrahdr\build --config RelWithDebInfo
      - name: Stage libultrahdr
        run: |
          mkdir install\include
          mkdir install\lib
          mkdir install\bin
          copy /Y libultrahdr\ultrahdr_api.h install\include\
          copy /Y libultrahdr\build\RelWithDebInfo\uhdr.dll install\bin\
          copy /Y libultrahdr\build\RelWithDebInfo\uhdr.lib install\lib\
          copy /Y libultrahdr\build\RelWithDebInfo\uhdr-static.lib install\lib\
          if exist libultrahdr\build\RelWithDebInfo\*.pdb copy /Y libultrahdr\build\RelWithDebInfo\*.pdb install\lib\
      - name: Verify libultrahdr artifacts
        run: |
          if not exist install\include\ultrahdr_api.h exit /b 1
          if not exist install\bin\uhdr.dll exit /b 1
          if not exist install\lib\uhdr.lib exit /b 1
          if not exist install\lib\uhdr-static.lib exit /b 1
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.version }}-${{ steps.virtuals.outputs.vs }}-${{ matrix.arch }}
          path: install
