name: Build libultrahdr
run-name: "Build ${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: libultrahdr tag to build
        required: true
        default: libultrahdr-1.4.0
      php:
        description: PHP version to build for
        required: true
        default: '8.6'
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
        arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout libultrahdr
        uses: actions/checkout@v5
        with:
          path: libultrahdr
          repository: winlibs/libultrahdr
          ref: ${{ github.event.inputs.version }}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{ github.event.inputs.php }} -arch ${{ matrix.arch }}
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.x'
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
          toolset: ${{ steps.virtuals.outputs.toolset }}
      - name: Configure libultrahdr
        run: >-
          cmake -S libultrahdr -B libultrahdr\build
          -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DBUILD_SHARED_LIBS=ON
          -DUHDR_BUILD_EXAMPLES=OFF
          -DUHDR_BUILD_TESTS=OFF
          -DUHDR_BUILD_BENCHMARK=OFF
          -DUHDR_BUILD_FUZZERS=OFF
          -DUHDR_BUILD_DEPS=ON
          -DUHDR_BUILD_JAVA=OFF
          -DUHDR_BUILD_PACKAGING=OFF
          -DUHDR_ENABLE_INSTALL=OFF
          -DUHDR_ENABLE_GLES=OFF
          -DUHDR_ENABLE_WERROR=OFF
          -DUHDR_WRITE_XMP=OFF
          -DUHDR_WRITE_ISO=ON
      - name: Build libultrahdr
        run: cmake --build libultrahdr\build --config RelWithDebInfo
      - name: Stage libultrahdr
        run: |
          mkdir install\include
          mkdir install\lib
          mkdir install\bin
          copy /Y libultrahdr\ultrahdr_api.h install\include\
          copy /Y libultrahdr\build\uhdr.dll install\bin\
          copy /Y libultrahdr\build\uhdr.lib install\lib\
          copy /Y libultrahdr\build\uhdr-static.lib install\lib\uhdr_a.lib
          if exist libultrahdr\build\*.pdb copy /Y libultrahdr\build\*.pdb install\lib\
          if exist install\lib\uhdr-static.pdb move /Y install\lib\uhdr-static.pdb install\lib\uhdr_a.pdb
      - name: Verify libultrahdr artifacts
        run: |
          if not exist install\include\ultrahdr_api.h exit /b 1
          if not exist install\bin\uhdr.dll exit /b 1
          if not exist install\lib\uhdr.lib exit /b 1
          if not exist install\lib\uhdr_a.lib exit /b 1
          cl /nologo /W3 /MD /DUHDR_USING_SHARED_LIBRARY /Iinstall\include winlib-builder\.github\ci\check-libultrahdr.c /link /LIBPATH:install\lib uhdr.lib /OUT:check-libultrahdr-shared.exe
          if errorlevel 1 exit /b %errorlevel%
          set PATH=%GITHUB_WORKSPACE%\install\bin;%PATH%
          check-libultrahdr-shared.exe
          if errorlevel 1 exit /b %errorlevel%
          cl /nologo /W3 /MD /Iinstall\include winlib-builder\.github\ci\check-libultrahdr.c /link /LIBPATH:install\lib uhdr_a.lib libultrahdr\build\turbojpeg\src\turbojpeg-build\jpeg-static.lib /OUT:check-libultrahdr-static.exe
          if errorlevel 1 exit /b %errorlevel%
          check-libultrahdr-static.exe
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.version }}-${{ steps.virtuals.outputs.vs }}-${{ matrix.arch }}
          path: install
