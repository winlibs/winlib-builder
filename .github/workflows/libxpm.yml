name: Build libxpm
run-name: "Build ${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: libxpm tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout libxpm
        uses: actions/checkout@v5
        with:
          path: libxpm
          repository: winlibs/libxpm
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Setup msbuild
        uses: microsoft/setup-msbuild@v2
      - name: Patch libxpm
        run: cd libxpm && git apply --ignore-whitespace ..\winlib-builder\patches\libxpm.patch
      - name: Build libxpm
        run: cd libxpm\windows\${{steps.virtuals.outputs.vs}} && msbuild libxpm.sln "/p:Configuration=Static Release" /p:Platform=${{steps.virtuals.outputs.msarch}} /p:PlatformToolset=${{steps.virtuals.outputs.msts}} /p:WindowsTargetPlatformVersion=${{steps.virtuals.outputs.winsdk}}
      - name: Install libxpm
        run: |
          cd libxpm\windows\${{steps.virtuals.outputs.vs}}
          xcopy ..\..\include\X11\* ..\..\..\install\include\X11\*
          xcopy "..\builds\${{steps.virtuals.outputs.msarch}}\Static Release\libxpm_a.*" ..\..\..\install\lib\*
      - name: Copy license files
        run: |
          xcopy libxpm\COPYING install\share\licenses\libxpm\*
          xcopy libxpm\COPYRIGHT install\share\licenses\libxpm\*
      - name: Generate SBOMs
        shell: pwsh
        run: >
          .\winlib-builder\scripts\generate-sbom.ps1
          -Library libxpm
          -Version '${{ github.event.inputs.version }}'
          -InstallRoot 'install'
          -Vs '${{ steps.virtuals.outputs.vs }}'
          -Arch '${{ matrix.arch }}'
          -PhpVersion '${{ github.event.inputs.php }}'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
