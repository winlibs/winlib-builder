name: Build libzip
on:
  workflow_dispatch:
    inputs:
      version:
        description: libzip tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
      stability:
        description: the series stability
        required: false
        default: 'staging'
      workflow_run_ids:
        description: Comma-separated winlib-builder workflow run IDs to download dependency artifacts from
        required: false
permissions:
  actions: read
  contents: read
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout libzip
        uses: actions/checkout@v5
        with:
          path: libzip
          repository: winlibs/libzip
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Fetch dependencies
        run: powershell winlib-builder/scripts/fetch-deps -lib libzip -version ${{github.event.inputs.php}} -vs ${{steps.virtuals.outputs.vs}} -arch ${{matrix.arch}} -stability ${{github.event.inputs.stability}} -workflow_run_ids:'${{github.event.inputs.workflow_run_ids}}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure libzip for PHP < 8.0
        if: github.event.inputs.php < 8.0
        run: cmake -S libzip -B libzip\build -G "Visual Studio ${{steps.virtuals.outputs.vsnum}} ${{steps.virtuals.outputs.vsyear}}" -A ${{steps.virtuals.outputs.msarch}} -T ${{steps.virtuals.outputs.msts}} -DCMAKE_SYSTEM_VERSION=${{steps.virtuals.outputs.winsdk}} -DCMAKE_INCLUDE_PATH:PATH=${{github.workspace}}\deps\include -DCMAKE_LIBRARY_PATH:PATH=${{github.workspace}}\deps\lib -DCMAKE_PROJECT_INCLUDE:FILEPATH=${{github.workspace}}\winlib-builder\cmake\php-sdk-library-suffixes.cmake -DBUILD_TOOLS=OFF -DBUILD_REGRESS=OFF -DBUILD_EXAMPLES=OFF -DBUILD_DOC=OFF
      - name: Configure libzip for PHP >= 8.0
        if: github.event.inputs.php >= 8.0
        run: cmake -S libzip -B libzip\build -G "Visual Studio ${{steps.virtuals.outputs.vsnum}} ${{steps.virtuals.outputs.vsyear}}" -A ${{steps.virtuals.outputs.msarch}} -T ${{steps.virtuals.outputs.msts}} -DCMAKE_SYSTEM_VERSION=${{steps.virtuals.outputs.winsdk}} -DCMAKE_INCLUDE_PATH:PATH=${{github.workspace}}\deps\include -DCMAKE_LIBRARY_PATH:PATH=${{github.workspace}}\deps\lib -DCMAKE_PROJECT_INCLUDE:FILEPATH=${{github.workspace}}\winlib-builder\cmake\php-sdk-library-suffixes.cmake -DENABLE_COMMONCRYPTO=OFF -DENABLE_GNUTLS=OFF -DENABLE_MBEDTLS=OFF -DENABLE_OPENSSL=OFF -DBUILD_TOOLS=OFF -DBUILD_REGRESS=OFF -DBUILD_OSSFUZZ=OFF -DBUILD_EXAMPLES=OFF -DBUILD_DOC=OFF
      - name: Build libzip
        run: cmake --build libzip\build --config RelWithDebInfo
      - name: Install libzip
        run: |
          cmake --install libzip\build --config RelWithDebInfo --prefix install
          if exist libzip\build\lib\RelWithDebInfo\libzip_a.pdb (
              xcopy libzip\build\lib\RelWithDebInfo\libzip_a.pdb install\lib\*
          ) else (
              xcopy libzip\build\lib\libzip_a.dir\RelWithDebInfo\libzip_a.pdb install\lib\*
          )
          rmdir /s /q install\lib\pkgconfig
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
