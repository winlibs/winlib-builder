name: Build libxml2
run-name: "Build ${{ inputs.version }} for PHP ${{ inputs.php }}"
on:
  workflow_dispatch:
    inputs:
      version:
        description: libxml2 tag to build
        required: true
      php:
        description: PHP version to build for
        required: true
      stability:
        description: the series stability
        required: false
        default: 'staging'
      workflow_run_ids:
        description: Comma-separated winlib-builder workflow run IDs to download dependency artifacts from
        required: false
permissions:
  actions: read
  contents: read
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
          arch: [x64, x86]
    runs-on: ${{ (inputs.php == '8.6' || inputs.php == 'master') && 'windows-2025-vs2026' || 'windows-2022' }}
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
      - name: Checkout libxml2
        uses: actions/checkout@v5
        with:
          path: libxml2
          repository: winlibs/libxml2
          ref: ${{github.event.inputs.version}}
      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{github.event.inputs.php}} -arch ${{matrix.arch}}
      - name: Setup MSVC development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{matrix.arch}}
          toolset: ${{steps.virtuals.outputs.toolset}}
      - name: Fetch dependencies
        run: powershell winlib-builder/scripts/fetch-deps -lib libxml2 -version ${{github.event.inputs.php}} -vs ${{steps.virtuals.outputs.vs}} -arch ${{matrix.arch}} -stability ${{github.event.inputs.stability}} -workflow_run_ids:'${{github.event.inputs.workflow_run_ids}}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure libxml2
        run: cd libxml2\win32 && cscript configure.js lib=%GITHUB_WORKSPACE%\deps\lib include=%GITHUB_WORKSPACE%\deps\include vcmanifest=yes prefix=%GITHUB_WORKSPACE%\install
      - name: Build libxml2
        run: cd libxml2\win32 && nmake /f Makefile.msvc
      - name: Install libxml2
        run: |
          cd libxml2\win32
          nmake /f Makefile.msvc install
          cd ..\..
          del /q install\bin\run*
          del /q install\bin\test*
          del /q install\bin\xml*.pdb
      - name: Copy license files
        run: xcopy libxml2\Copyright install\share\licenses\libxml2\*
      - name: Generate SBOMs
        shell: pwsh
        run: >
          .\winlib-builder\scripts\generate-sbom.ps1
          -Library libxml2
          -Version '${{ github.event.inputs.version }}'
          -InstallRoot 'install'
          -Vs '${{ steps.virtuals.outputs.vs }}'
          -Arch '${{ matrix.arch }}'
          -PhpVersion '${{ github.event.inputs.php }}'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{github.event.inputs.version}}-${{steps.virtuals.outputs.vs}}-${{matrix.arch}}
          path: install
